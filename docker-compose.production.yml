# DealSim Production Docker Compose
# Target: UpCloud VPS — 2 CPU, 8GB RAM, Ubuntu 24.04
# Usage: docker compose -f docker-compose.production.yml up -d
#
# Service naming: the app service is named "app" to match the upstream block
# in nginx/nginx.conf (server app:8000). Do not rename it to "dealsim" here
# unless you also change nginx.conf.

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true   # app is not reachable from the host directly

volumes:
  # All persistent app data in one volume: sessions, analytics, feedback.
  # Mount target /app/data matches DEALSIM_DATA_DIR in .env.example.
  app-data:
  certbot-conf:
  certbot-www:
  nginx-logs:

services:

  # ---------------------------------------------------------------------------
  # app — FastAPI application served by uvicorn
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dealsim-app
    env_file:
      - .env
    environment:
      DEALSIM_ENV: production
      DEALSIM_DATA_DIR: /app/data
      # 2 vCPU host: formula is (2 * cores) + 1 = 5, but we stay at 4 to leave
      # headroom. Requires Changes 1-3 from SCALING_ANALYSIS.md before raising
      # past 1 (per-session file writes, disk fallback lookup, nginx rate limit).
      DEALSIM_WORKERS: "4"
    volumes:
      - app-data:/app/data
    networks:
      - frontend   # needed for outbound HTTPS to external LLM APIs (DeepSeek, OpenAI, etc.)
      - backend
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy, TLS termination, rate limiting
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: dealsim-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Use the more complete sites-available config for production
      - ./nginx/sites-available/dealsim.conf:/etc/nginx/conf.d/dealsim.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
      # Error pages served directly by nginx (not proxied through app)
      - ./nginx/error-pages:/etc/nginx/error-pages:ro
      - nginx-logs:/var/log/nginx
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO /dev/null http://localhost:80/nginx-health || exit 1"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 96M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # certbot — Let's Encrypt certificate renewal (runs every 12 hours)
  #
  # First-time certificate issuance is handled by scripts/deploy.sh.
  # This service only handles renewals once a cert already exists.
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: dealsim-certbot
    depends_on:
      - nginx
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Attempt renewal every 12 hours; certbot skips if cert is not due yet
    entrypoint: >
      /bin/sh -c '
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 43200 & wait $$!;
        done
      '
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
