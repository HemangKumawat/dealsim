# =============================================================================
# dealsim.conf — Server block for dealsim.org (or your domain)
# Handles: HTTPS termination, rate limiting, security headers, proxy, WebSocket
# =============================================================================

# --- Variables (edit these) ---
# Replace YOUR_DOMAIN with the actual domain, e.g. dealsim.org
# Replace ALLOWED_ADMIN_IP with your static IP for admin access

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name dealsim.org www.dealsim.org;

    # Docker healthcheck — must be reachable before certs exist
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS server ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name dealsim.org www.dealsim.org;

    # =========================================================================
    # SSL / TLS
    # =========================================================================
    ssl_certificate     /etc/letsencrypt/live/dealsim.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dealsim.org/privkey.pem;

    # TLS 1.2+ only, modern cipher suite
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/dealsim.org/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # SSL session caching (shared across workers)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # DH params (generate with: openssl dhparam -out /etc/nginx/dhparam.pem 2048)
    # Uncomment after generating:
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # =========================================================================
    # Security headers
    # =========================================================================
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://$host; font-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # =========================================================================
    # CORS — restrict to known origins
    # =========================================================================
    # Add/remove origins as needed
    set $cors_origin "";
    if ($http_origin ~* "^https://(dealsim\.io|www\.dealsim\.io)$") {
        set $cors_origin $http_origin;
    }

    # =========================================================================
    # Nginx internal health check (no upstream required — used by Docker healthcheck)
    # =========================================================================
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # =========================================================================
    # Static files
    #
    # Static assets are baked into the app container image — nginx cannot
    # alias into a container filesystem it does not share a volume with.
    # We proxy /static/ to the backend and set aggressive cache headers here
    # at the nginx layer so the browser caches them correctly.
    # If you later add a shared static volume, switch these back to alias.
    # =========================================================================

    # Versioned assets — fingerprinted filenames like app.a1b2c3d4.js
    # 1-year immutable cache; cache-busting is via filename change.
    location ~* /static/.+\.[0-9a-f]+\.(js|css|woff2?|ttf|eot|png|jpg|jpeg|webp|svg|ico)$ {
        proxy_pass http://dealsim_backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_cache        static_cache;
        proxy_cache_valid  200 7d;
        proxy_cache_use_stale error timeout updating;

        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Non-versioned static files — revalidate every hour
    location /static/ {
        proxy_pass http://dealsim_backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_cache        static_cache;
        proxy_cache_valid  200 1h;
        proxy_cache_use_stale error timeout updating;

        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header Vary "Accept-Encoding";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Favicon shortcut
    location = /favicon.ico {
        proxy_pass http://dealsim_backend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    # =========================================================================
    # Health check (no rate limit, no logging)
    # =========================================================================
    location = /health {
        access_log off;
        proxy_pass http://dealsim_backend;
        proxy_set_header Host $host;
    }

    # =========================================================================
    # Auth-sensitive endpoints — strict rate limit (10 req/min)
    # =========================================================================
    location ~ ^/api/(auth|login|register|password|token) {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;

        # CORS headers
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;

        # Security headers (must repeat in location block)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://dealsim_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # =========================================================================
    # Admin panel — IP-restricted
    # =========================================================================
    location /admin/ {
        # Replace with your actual admin IPs
        allow 94.237.87.238;   # Server itself (loopback via public IP)
        allow 127.0.0.1;
        # allow YOUR_HOME_IP;  # Uncomment and set your static IP
        deny all;

        proxy_pass http://dealsim_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # =========================================================================
    # WebSocket endpoint (for future real-time features)
    # =========================================================================
    location /ws/ {
        proxy_pass http://dealsim_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =========================================================================
    # General API — standard rate limit (100 req/min)
    # =========================================================================
    location / {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        # CORS headers
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;

        # Security headers (must repeat in location block)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://dealsim_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffering for upstream responses
        proxy_buffering on;
    }

    # =========================================================================
    # Custom error pages
    # =========================================================================
    error_page 429 /429.html;
    location = /429.html {
        default_type application/json;
        return 429 '{"error": "rate_limit_exceeded", "message": "Too many requests. Please slow down.", "retry_after": 60}';
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        # Serve the branded HTML error page from the bind-mounted error-pages directory.
        # This location is internal-only — clients cannot request it directly.
        internal;
        root /etc/nginx/error-pages;
        try_files /502.html =502;
    }
}
