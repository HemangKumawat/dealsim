# =============================================================================
# nginx.conf — Main configuration for DealSim production reverse proxy
# Server: UpCloud 2 CPU / 8GB RAM, Ubuntu 24.04, Frankfurt DC
# =============================================================================

user nginx;

# Scale automatically to available CPU cores
worker_processes auto;

# Each worker handles 1024 simultaneous connections
events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

http {
    # --- Basic settings ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout  65;
    keepalive_requests 100;

    # Hide nginx version from response headers
    server_tokens off;

    # --- Logging with full request timing ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'uct=$upstream_connect_time '
                    'uht=$upstream_header_time '
                    'urt=$upstream_response_time '
                    'cs=$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    # --- Client limits ---
    client_max_body_size    1m;
    client_body_buffer_size 16k;

    # --- Proxy buffer tuning ---
    proxy_buffer_size       4k;
    proxy_buffers           8 4k;
    proxy_busy_buffers_size 8k;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/html
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # --- Proxy cache for static assets ---
    # Files stored in /tmp so they survive container restarts without a named volume
    proxy_cache_path /tmp/nginx_cache
        levels=1:2
        keys_zone=static_cache:5m
        max_size=100m
        inactive=7d
        use_temp_path=off;

    # --- Rate limiting zones ---
    # General traffic: 10 requests/second per IP (burst handled per location)
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

    # Auth-sensitive endpoints: 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

    # Return 429 on rate limit breach (RFC 6585) instead of default 503
    limit_req_status 429;

    # --- Upstream backend ---
    # Service name matches the docker-compose service: "app" on port 8000.
    # docker-compose.production.yml also names its app service "app" (see note there).
    upstream dealsim_backend {
        server app:8000;
        keepalive 32;
    }

    # --- Include site configs ---
    include /etc/nginx/conf.d/*.conf;
}
