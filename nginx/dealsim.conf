# ------------------------------------------------------------------
# DealSim nginx server block — LEGACY / REFERENCE FILE
#
# This file (nginx/dealsim.conf) is NOT mounted by docker-compose.yml or
# docker-compose.production.yml. The active production config is at:
#
#   nginx/sites-available/dealsim.conf
#
# This file is kept as a simpler reference. Do not edit it for production.
# ------------------------------------------------------------------

# Redirect HTTP -> HTTPS (and serve ACME challenges)
server {
    listen 80;
    listen [::]:80;
    server_name dealsim.org;

    # Let certbot verify domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Nginx health check (used by docker healthcheck)
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Everything else -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dealsim.org;

    # --- SSL certificates (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/dealsim.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dealsim.org/privkey.pem;

    # --- SSL hardening ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # --- Request limits ---
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # --- Proxy to FastAPI app ---
    location / {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://dealsim_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Stricter rate limit on API endpoints
    location /api/ {
        limit_req zone=api_auth burst=10 nodelay;

        proxy_pass http://dealsim_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # WebSocket support (if needed for real-time features)
    location /ws {
        proxy_pass http://dealsim_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Health endpoint (no rate limit, no logging)
    location = /health {
        access_log off;
        proxy_pass http://dealsim_backend;
    }

    # Block common scanners
    location ~* /(\.env|\.git|wp-admin|wp-login|phpmyadmin) {
        return 444;
    }
}
