# =============================================================================
# docker-compose.production.yml — Full production stack
# nginx (reverse proxy + TLS) + FastAPI app + certbot (auto-renewal)
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml logs -f nginx
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI application
  # ---------------------------------------------------------------------------
  dealsim:
    build: .
    expose:
      - "8000"          # Internal only — nginx handles external traffic
    env_file:
      - .env
    environment:
      - DEALSIM_ENV=production
      - DEALSIM_DATA_DIR=/tmp/dealsim_data
    volumes:
      - dealsim-data:/tmp/dealsim_data
      - dealsim-analytics:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # nginx reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available/dealsim.conf:/etc/nginx/conf.d/dealsim.conf:ro
      - ./nginx/error-pages:/etc/nginx/error-pages:ro
      - ./static:/app/static:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      dealsim:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal
      - external

  # ---------------------------------------------------------------------------
  # Certbot — SSL certificate management
  # ---------------------------------------------------------------------------
  # Initial cert: run the init script first (see NGINX_SSL_GUIDE.md)
  # Renewal: this container wakes every 12 hours to check
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - external

volumes:
  dealsim-data:
  dealsim-analytics:
  certbot-webroot:
  certbot-certs:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
